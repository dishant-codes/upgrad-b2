<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            height: 100vh;
            display: grid;
            place-items: center;
        }


        .box{
            background-color: rgb(0, 169, 169);
            width: 100px;
            height: 100px;
            border-radius: 10px;
            transition: all .3s ease; /* avoid this prod */
            /*  property  duration  easing */
        }


        .box:hover{
            transform: scale(1.3) rotate(10deg);
            background-color: aquamarine;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    
    <div class="box"></div>

</body>
</html>
