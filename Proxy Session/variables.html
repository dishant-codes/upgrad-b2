<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <style>
        :root{
            --brand: #ad005f;
        }
        .heading{
            text-align: center;
        }

        .border{
            border: 4px solid var(--brand);
        }

        .button{
            padding: 10px 30px;
            font-size: 15px;
            font-weight: bold;
            border: 2px solid var(--brand);
        }

        .link{
            color: var(--brand);
        }


    </style>
</head>
<body>

    <h1 class="heading border">This is Heading</h1>
    <button class="button">Button</button>
    <a href="#" class="link">click here</a>
    
    
</body>
</html>
