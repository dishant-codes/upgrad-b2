<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <style>

        .dashboard{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 100px 400px;
            gap: 12px;
        }

        .revenue{
            background-color: gray;
            color: white;
            text-align: center;
        }

        .users{
            background-color: blue;
            color: white;
            text-align: center;
        }
        .growth{
            background-color: brown;
            color: white;
            text-align: center;
        }
        .mainChart{
            background-color: orange;
            color: white;
            text-align: center;
            grid-column: 1 / 3;
        }


        .activity{
            background-color: gray;
            color: white;
            text-align: center;
        }


    </style>
</head>
<body>
    
    <div class="dashboard">

            <div class="revenue">
                $45K
            </div>

            <div class="users">
                1500
            </div>

            <div class="growth">
                +12%
            </div>

            <div class="mainChart">
                Main Chart
            </div>


            <div class="activity">
                Activity Feed
            </div>



    </div>
    
</body>
</html>
